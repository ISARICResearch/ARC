#:schema schemas/parser.schema.json

[adtl]
  name = "isaric-covid"
  description = "Converts ISARIC processed COVID-19 dataset to the ISARIC-ARC format"
  emptyFields = "NA"

  [adtl.defs."Y/N/NK"]
    values = { TRUE = "Yes", FALSE = "No" }

  [adtl.defs."VAL/UNK"]
    values = { TRUE = "VAL", FALSE = "VAL" }

  [adtl.defs.phase_presentation]
    phase = "presentation"
    date = { field = "date_admit" }

  [adtl.defs.phase_outcome]
    phase = "outcome"
    date = { field = "date_outcome" }

  [adtl.tables]
    core = { kind = "groupBy", groupBy = "subjid", aggregation = "lastNotNull", schema = "schemas/isaric-core.schema.json" }

    [adtl.tables.long]
      kind = "oneToMany"
      schema = "schemas/arc_1.2.2_isaric_long.schema.json"
      discriminator = "attribute"
      common = { subjid = { field = "usubjid" }, arcver = "1.2.2", dataset_id = { field = "studyid" } }

[core]
  demog_country_iso3 = { field = "country_iso", description = "Country ISO3 code" }
  siteid = { field = "siteid_final", description = "Site ID" }
  subjid = { field = "usubjid", description = "Unique Subject Identifier" }
  dataset_id = { field = "studyid" }
  dataset_disease = "COVID-19"
  pres_adm = "Unknown"
  pres_date = { field = "date_admit" }
  outco_date = { field = "date_outcome" }

  [core.demog_sex]
    field = "slider_sex"
    values = { Male = "Male", Female = "Female" }

  [core.demog_age_days]
    field = "age"
    unit = "days"
    source_unit = "years"

  [core.outco_outcome]
    field = "outcome"
    ignoreMissingKey = true

    [core.outco_outcome.values]
      discharge = "Discharged alive"
      released = "Discharged alive"
      "released with home care" = "Discharged alive"
      "released without instructions" = "Discharged alive"
      "cured (confirmed by a negative covid test)" = "Discharged alive"
      "recovery (confirmed by a negative test)" = "Discharged alive"
      "recovery (confirmed by a negative covid test)" = "Discharged alive"
      "recovered (confirmed by a negative covid-19 test)" = "Discharged alive"
      "recovered (confirmed by negative covid-19 test)" = "Discharged alive"
      "ongoing care" = "Still hospitalised"
      transferred = "Transfer to other facility"
      "moved to facility" = "Transfer to other facility"
      death = "Death"

[[long]]
  attribute = "demog_race"
  ref = "phase_presentation"
  [long.attribute_status]
