  ref = "phase_outcome"

[[long]]
  attribute = "inter_suppleo2"
  ref = "phase_outcome"
  [long.value]
    combinedType = "firstNonNull"
    fields = [
      { field = "treat_oxygen_therapy", ref = "Y/N/NK" },
      { field = "icu_treat_oxygen_therapy", ref = "Y/N/NK" },
    ]

  [long.attribute_status]
    combinedType = "firstNonNull"
    fields = [
      { field = "treat_oxygen_therapy", ref = "VAL/UNK" },
      { field = "icu_treat_oxygen_therapy", ref = "VAL/UNK" },
    ]

