  value = { field = "icu_treat_non_invasive_ventilation", ref = "Y/N/NK" }
  attribute_status = { field = "icu_treat_non_invasive_ventilation", apply = { function = "attribute_status_fill" } }
  phase = "during_observation"
  date = { field = "icu_in" }

