name: Run Python Script on Tag

on:
  push:
    tags:
      - '*'  # Trigger on all tags
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-script:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Determine tag name
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            TAG_NAME=${GITHUB_REF#refs/tags/}
          else
            TAG_NAME=$(git describe --tags --abbrev=0)
          fi
          echo "Running with tag: $TAG_NAME"
          echo "TAG_NAME=$TAG_NAME" >> $GITHUB_ENV

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ".[dev]"

      - name: Run scripts with tag
        run: |
          python schemas/isaric_schema.py "$TAG_NAME"
          python schemas/draft_parser.py "$TAG_NAME"

      - name: Test generated files
        run: |
          python -m pytest tests/test_generated_parser.py

      - name: Commit and push changes
        run: |
            git config --global user.name "github-actions[bot]"
            git config --global user.email "github-actions[bot]@users.noreply.github.com"
            git add schemas/arc_${TAG_NAME}_isaric_long_schema.json
            git add schemas/global_arc_${TAG_NAME}_parser.toml
            git commit -m "Add generated schema and parser for tag $TAG_NAME" || echo "No changes to commit"
            git push
